<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archeo Table Designer v2 — Screenshot Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --p50:#E5F0FF;--p100:#CCE1FF;--p200:#99C3FF;--p300:#66A5FF;--p400:#3384FF;--p500:#1A62FF;--p600:#0047E0;--p700:#0035A8;--p800:#002470;--p900:#05205D;
  --n0:#FFF;--n50:#FAFAFA;--n100:#F5F5F5;--n200:#E5E5E5;--n300:#D4D4D4;--n400:#A3A3A3;--n500:#737373;--n600:#525252;--n700:#404040;--n800:#262626;--n900:#171717;
  --g:#22C55E;--y:#F59E0B;--r:#EF4444;
  --radius-sm:4px;--radius-md:8px;--radius-lg:12px;
  --dat:#CCE1FF;--dat-t:#262626;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',sans-serif; background:#E8E8E8; color:var(--n900); }

/* Control Panel */
.control-panel {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background: var(--n900);
  color: var(--n0);
  padding: 10px 24px;
  z-index: 100;
  display: flex;
  gap: 20px;
  align-items: center;
  flex-wrap: wrap;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.control-group {
  display: flex;
  align-items: center;
  gap: 6px;
}
.control-group label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--n400);
  white-space: nowrap;
}
.control-group input[type="number"] {
  width: 52px;
  padding: 5px 6px;
  border: 1px solid var(--n600);
  border-radius: 4px;
  background: var(--n800);
  color: var(--n0);
  font-size: 11px;
  font-family: 'Geist Mono', monospace;
}
.control-group input[type="number"]:focus {
  outline: none;
  border-color: var(--p500);
}
.control-group input[type="color"] {
  width: 28px;
  height: 24px;
  border: 1px solid var(--n600);
  border-radius: 3px;
  background: var(--n800);
  cursor: pointer;
  padding: 0;
}
.control-section {
  display: flex;
  gap: 12px;
  padding: 0 14px;
  border-left: 1px solid var(--n700);
  align-items: center;
}
.control-section:first-child {
  border-left: none;
  padding-left: 0;
}
.section-title {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--p400);
  writing-mode: vertical-rl;
  transform: rotate(180deg);
  margin-right: 4px;
}
.view-toggle {
  display: flex;
  gap: 4px;
}
.view-toggle button {
  padding: 5px 10px;
  border: 1px solid var(--n600);
  background: var(--n800);
  color: var(--n400);
  font-size: 10px;
  font-weight: 600;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s;
}
.view-toggle button:hover {
  border-color: var(--p500);
  color: var(--n0);
}
.view-toggle button.active {
  background: var(--p500);
  border-color: var(--p500);
  color: var(--n0);
}
.reset-btn {
  padding: 5px 10px;
  background: var(--n700);
  border: 1px solid var(--n600);
  color: var(--n300);
  font-size: 10px;
  font-weight: 500;
  border-radius: 4px;
  cursor: pointer;
}
.reset-btn:hover {
  background: var(--n600);
  color: var(--n0);
}
.width-warning {
  font-size: 10px;
  color: var(--y);
  font-weight: 500;
}
.width-ok {
  font-size: 10px;
  color: var(--g);
  font-weight: 500;
}

/* Column Width Sliders */
.column-controls {
  position: fixed;
  top: 52px;
  left: 0;
  right: 0;
  background: var(--n800);
  padding: 10px 24px;
  z-index: 99;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  border-bottom: 1px solid var(--n700);
  align-items: flex-end;
}
.col-control {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.col-control label {
  font-size: 9px;
  font-weight: 600;
  color: var(--n400);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.col-control .input-row {
  display: flex;
  gap: 4px;
  align-items: center;
}
.col-control input[type="range"] {
  width: 60px;
  height: 4px;
  -webkit-appearance: none;
  background: var(--n600);
  border-radius: 2px;
  cursor: pointer;
}
.col-control input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 10px;
  height: 10px;
  background: var(--p500);
  border-radius: 50%;
  cursor: grab;
}
.col-control input[type="number"] {
  width: 44px;
  padding: 3px 5px;
  border: 1px solid var(--n600);
  border-radius: 3px;
  background: var(--n700);
  color: var(--n0);
  font-size: 10px;
  font-family: 'Geist Mono', monospace;
}
.col-control.total-width {
  background: var(--p900);
  padding: 6px 10px;
  border-radius: 6px;
  margin-right: 8px;
}
.col-control.total-width label {
  color: var(--p300);
}
.col-control.total-width input {
  width: 56px;
  background: var(--p800);
  border-color: var(--p600);
}
.col-percent {
  font-size: 9px;
  color: var(--n500);
  font-family: 'Geist Mono', monospace;
  text-align: center;
}

/* Main Content */
.page {
  padding: 120px 24px 40px;
}
.page-head {
  margin-bottom: 12px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}
.page-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--n400);
}
.page-desc {
  font-size: 12px;
  color: var(--n500);
}

/* Table Styles */
.tbl-wrap {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  background: var(--n0);
  border-radius: var(--radius-md);
  border: 1px solid var(--n200);
  display: inline-block;
}
table.t {
  border-collapse: collapse;
  table-layout: fixed;
}
.t th {
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--n400);
  background: var(--n50);
  padding: 8px 10px;
  text-align: left;
  white-space: nowrap;
  position: relative;
}
.t th .resize-handle {
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: 6px;
  cursor: col-resize;
  background: transparent;
}
.t th .resize-handle:hover,
.t th .resize-handle.dragging {
  background: var(--p500);
}
.t td {
  padding: 10px;
  vertical-align: top;
  color: var(--n700);
  word-break: break-word;
}
.t tr:hover td {
  background: var(--p50);
}

/* Cell Types */
.t .ti {
  font-family: 'Geist Mono', monospace;
  color: var(--p500);
  font-weight: 500;
  white-space: nowrap;
}
.t .geo-cell {
  line-height: 1.4;
}
.t .geo-obec {
  font-weight: 600;
  color: var(--n800);
}
.t .geo-ku {
  color: var(--n500);
}
.t .geo-ku.same {
  color: var(--n300);
}
.t .geo-okres {
  color: var(--n500);
}
.t .pol-c {
  color: var(--n500);
  line-height: 1.5;
}
.t .st-cell {
  vertical-align: top;
  text-align: center;
}
.st-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
}
.st-1 { background: var(--g); }
.st-2 { background: var(--y); }
.st-3 { background: var(--r); }

/* Chips */
.chips {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.ch {
  font-weight: 500;
  line-height: 1.3;
  padding: 2px 6px;
  border-radius: var(--radius-sm);
  white-space: nowrap;
}
.ch-d { background: var(--dat); color: var(--dat-t); }
.ch-s { background: var(--n100); color: var(--n600); }
.ch-n { background: var(--n200); color: var(--n500); }

/* Stats bar */
.stats-bar {
  display: flex;
  gap: 16px;
  padding: 8px 0;
  margin-bottom: 12px;
  font-size: 11px;
  color: var(--n500);
}
.stats-bar span {
  font-family: 'Geist Mono', monospace;
}

/* Hidden class for view toggle */
.hidden { display: none !important; }
</style>
</head>
<body>

<div class="control-panel">
  <div class="control-section">
    <div class="view-toggle">
      <button id="btn-a" class="active" onclick="setView('a')">A · Raw</button>
      <button id="btn-b" onclick="setView('b')">B · Grouped</button>
    </div>
  </div>
  
  <div class="control-section">
    <span class="section-title">Fonts</span>
    <div class="control-group">
      <label>Č.A.</label>
      <input type="number" id="fs-id" value="12" min="9" max="16" onchange="renderTable()">
    </div>
    <div class="control-group">
      <label>Head</label>
      <input type="number" id="fs-header" value="10" min="8" max="14" onchange="renderTable()">
    </div>
    <div class="control-group">
      <label>Geo</label>
      <input type="number" id="fs-geo" value="13" min="10" max="16" onchange="renderTable()">
    </div>
    <div class="control-group">
      <label>Poloha</label>
      <input type="number" id="fs-poloha" value="12" min="10" max="15" onchange="renderTable()">
    </div>
    <div class="control-group">
      <label>Chips</label>
      <input type="number" id="fs-chips" value="11" min="9" max="14" onchange="renderTable()">
    </div>
  </div>
  
  <div class="control-section">
    <span class="section-title">Cells</span>
    <div class="control-group">
      <label>Pad</label>
      <input type="number" id="row-padding" value="10" min="4" max="20" onchange="renderTable()">
    </div>
    <div class="control-group">
      <label>Border</label>
      <input type="number" id="border-width" value="1" min="0" max="3" step="0.5" onchange="renderTable()">
    </div>
    <div class="control-group">
      <label>Color</label>
      <input type="color" id="border-color" value="#E5E5E5" onchange="renderTable()">
    </div>
  </div>
  
  <div class="control-section">
    <span class="section-title">Dot</span>
    <div class="control-group">
      <label>Size</label>
      <input type="number" id="dot-size" value="8" min="4" max="16" onchange="renderTable()">
    </div>
    <div class="control-group">
      <label>Top</label>
      <input type="number" id="dot-top" value="3" min="0" max="20" onchange="renderTable()">
    </div>
  </div>
  
  <button class="reset-btn" onclick="resetAll()">Reset</button>
  <span id="width-status" class="width-ok">✓ Fits 1366px</span>
</div>

<div class="column-controls" id="colControls"></div>

<div class="page">
  <div class="page-head">
    <div>
      <div class="page-title">Archeo Table Designer v2</div>
      <p class="page-desc">Set total width or adjust columns. Datovanie-Druh merged. Screenshot when ready.</p>
    </div>
  </div>
  
  <div class="stats-bar">
    <span id="stats-rows">0 rows</span>
    <span id="stats-width">Width: 0px</span>
  </div>
  
  <div class="tbl-wrap" id="tableWrap">
    <table class="t" id="mainTable">
      <thead id="tableHead"></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

let currentView = 'a';
let columnWidths = {};
let totalWidth = 1028; // Default total

// Initialize column widths
COLUMNS.forEach(col => { columnWidths[col.id] = col.width; });

function getColumnSum() {
  return COLUMNS.reduce((sum, col) => sum + columnWidths[col.id], 0);
}

function createColumnControls() {
  const container = document.getElementById('colControls');
  
  // Total width control
  let html = `
    <div class="col-control total-width">
      <label>Total Width</label>
      <div class="input-row">
        <input type="number" id="total-width" min="600" max="1920" value="${totalWidth}"
               onchange="setTotalWidth(this.value)">
      </div>
    </div>
  `;
  
  // Individual column controls
  html += COLUMNS.map(col => {
    const pct = Math.round((col.width / totalWidth) * 100);
    return `
    <div class="col-control">
      <label>${col.label}</label>
      <div class="input-row">
        <input type="range" id="slider-${col.id}" min="${col.min}" max="${col.max}" value="${col.width}" 
               oninput="updateColWidth('${col.id}', this.value)">
        <input type="number" id="num-${col.id}" min="${col.min}" max="${col.max}" value="${col.width}"
               onchange="updateColWidth('${col.id}', this.value)">
      </div>
      <div class="col-percent" id="pct-${col.id}">${pct}%</div>
    </div>
  `}).join('');
  
  container.innerHTML = html;
}

function setTotalWidth(value) {
  const newTotal = parseInt(value);
  const currentSum = getColumnSum();
  const ratio = newTotal / currentSum;
  
  // Scale all columns proportionally
  COLUMNS.forEach(col => {
    let newWidth = Math.round(columnWidths[col.id] * ratio);
    newWidth = Math.max(col.min, Math.min(col.max, newWidth));
    columnWidths[col.id] = newWidth;
    document.getElementById(`slider-${col.id}`).value = newWidth;
    document.getElementById(`num-${col.id}`).value = newWidth;
  });
  
  totalWidth = newTotal;
  updatePercentages();
  renderTable();
  updateStats();
}

function updateColWidth(colId, value) {
  const v = parseInt(value);
  columnWidths[colId] = v;
  document.getElementById(`slider-${colId}`).value = v;
  document.getElementById(`num-${colId}`).value = v;
  
  // Update total to match sum
  totalWidth = getColumnSum();
  document.getElementById('total-width').value = totalWidth;
  
  updatePercentages();
  renderTable();
  updateStats();
}

function updatePercentages() {
  const sum = getColumnSum();
  COLUMNS.forEach(col => {
    const pct = Math.round((columnWidths[col.id] / sum) * 100);
    document.getElementById(`pct-${col.id}`).textContent = pct + '%';
  });
}

function renderTable() {
  renderTableHead();
  renderTableBody();
}

function renderTableHead() {
  const thead = document.getElementById('tableHead');
  const fsHeader = document.getElementById('fs-header').value;
  const borderWidth = document.getElementById('border-width').value;
  const borderColor = document.getElementById('border-color').value;
  
  thead.innerHTML = `<tr>${COLUMNS.map((col,i) => `
    <th style="font-size:${fsHeader}px; width:${columnWidths[col.id]}px; border-bottom:${borderWidth}px solid ${borderColor}">
      ${col.label}
      <div class="resize-handle" data-col="${i}"></div>
    </th>
  `).join('')}</tr>`;
  
  setupResizeHandles();
}

function renderTableBody() {
  const tbody = document.getElementById('tableBody');
  const table = document.getElementById('mainTable');
  
  const fsId = document.getElementById('fs-id').value;
  const fsGeo = document.getElementById('fs-geo').value;
  const fsPoloha = document.getElementById('fs-poloha').value;
  const fsChips = document.getElementById('fs-chips').value;
  const padding = document.getElementById('row-padding').value;
  const borderWidth = document.getElementById('border-width').value;
  const borderColor = document.getElementById('border-color').value;
  
  // Set table width
  table.style.width = getColumnSum() + 'px';
  
  const dotSize = document.getElementById('dot-size').value;
  const dotTop = document.getElementById('dot-top').value;
  
  const geoObecSize = fsGeo;
  const geoKuSize = parseInt(fsGeo) - 1;
  const geoOkresSize = parseInt(fsGeo) - 1;
  
  tbody.innerHTML = DATA.map((d, idx) => {
    const isLast = idx === DATA.length - 1;
    const borderStyle = isLast ? 'none' : `${borderWidth}px solid ${borderColor}`;
    
    // Datovanie-Druh merged cell
    let druhCell = '';
    if (currentView === 'a') {
      // Raw view - show rawTyp chips
      if (d.rawTyp.length && d.rawTyp[0] !== 'negatívne' && d.rawTyp[0] !== 'nedatovateľné') {
        druhCell = `<div class="chips">${d.rawTyp.map(r => 
          `<span class="ch ch-d" style="font-size:${fsChips}px">${r}</span>`
        ).join('')}</div>`;
      } else if (d.ceans === 'negatívne' || d.rawTyp[0] === 'negatívne') {
        druhCell = `<span class="ch ch-n" style="font-size:${fsChips}px">negatívne</span>`;
      } else if (d.ceans === 'NX' || d.rawTyp[0] === 'nedatovateľné') {
        druhCell = `<span class="ch ch-n" style="font-size:${fsChips}px">nedatovateľné</span>`;
      } else {
        druhCell = '—';
      }
    } else {
      // Grouped view - era chips + site chips
      if (d.eras && Object.keys(d.eras).length) {
        let chips = Object.keys(d.eras).map(era => {
          const subs = d.eras[era].filter(s => s);
          const isSpecial = ['PK','NX','NG'].includes(era);
          let label = ERA_NAMES[era] || era;
          if (subs.length) {
            const nums = subs.filter(s => /^\d+$/.test(s)).map(Number).sort((a,b)=>a-b);
            const alpha = subs.filter(s => !/^\d+$/.test(s));
            let subStr = '';
            if (nums.length >= 2 && nums.every((n,i) => i===0 || n === nums[i-1]+1)) {
              subStr = nums[0] + '–' + nums[nums.length-1];
            } else if (nums.length) {
              subStr = nums.join(', ');
            }
            if (alpha.length) subStr = alpha.join(', ') + (subStr ? ' ' + subStr : '');
            if (subStr) label += ' ' + subStr;
          }
          return `<span class="ch ${isSpecial ? 'ch-n' : 'ch-d'}" style="font-size:${fsChips}px">${label}</span>`;
        }).join('');
        
        // Add site chips
        if (d.sites.length) {
          chips += d.sites.map(s => 
            `<span class="ch ch-s" style="font-size:${fsChips}px">${s}</span>`
          ).join('');
        }
        
        druhCell = `<div class="chips">${chips}</div>`;
      } else if (d.ceans === 'negatívne') {
        druhCell = `<span class="ch ch-n" style="font-size:${fsChips}px">negatívne</span>`;
      } else if (d.ceans === 'NX') {
        druhCell = `<span class="ch ch-n" style="font-size:${fsChips}px">nedatovateľné</span>`;
      } else {
        druhCell = '—';
      }
    }
    
    // KU display - show in lighter color if same as Obec
    const kuSame = d.ku === d.obec;
    const kuDisplay = `<div class="geo-ku${kuSame ? ' same' : ''}" style="font-size:${geoKuSize}px">${d.ku}</div>`;
    
    return `<tr>
      <td class="ti" style="font-size:${fsId}px; padding:${padding}px; width:${columnWidths['ca']}px; border-bottom:${borderStyle}">${d.id}</td>
      <td class="st-cell" style="padding:${padding}px; width:${columnWidths['st']}px; border-bottom:${borderStyle}"><span class="st-dot st-${d.st}" style="width:${dotSize}px; height:${dotSize}px; margin-top:${dotTop}px"></span></td>
      <td class="geo-cell" style="padding:${padding}px; width:${columnWidths['obec']}px; border-bottom:${borderStyle}">
        <div class="geo-obec" style="font-size:${geoObecSize}px">${d.obec}</div>
      </td>
      <td class="geo-cell" style="padding:${padding}px; width:${columnWidths['ku']}px; border-bottom:${borderStyle}">
        ${kuDisplay}
      </td>
      <td class="geo-cell" style="padding:${padding}px; width:${columnWidths['okres']}px; border-bottom:${borderStyle}">
        <div class="geo-okres" style="font-size:${geoOkresSize}px">${d.okres}</div>
      </td>
      <td class="pol-c" style="font-size:${fsPoloha}px; padding:${padding}px; width:${columnWidths['poloha']}px; border-bottom:${borderStyle}">${d.poloha}</td>
      <td style="padding:${padding}px; width:${columnWidths['druh']}px; border-bottom:${borderStyle}">${druhCell}</td>
    </tr>`;
  }).join('');
}

function setupResizeHandles() {
  document.querySelectorAll('.resize-handle').forEach(handle => {
    handle.addEventListener('mousedown', startResize);
  });
}

let resizing = null;
let startX = 0;
let startWidth = 0;

function startResize(e) {
  e.preventDefault();
  const colIndex = parseInt(e.target.dataset.col);
  resizing = COLUMNS[colIndex];
  startX = e.clientX;
  startWidth = columnWidths[resizing.id];
  e.target.classList.add('dragging');
  document.addEventListener('mousemove', doResize);
  document.addEventListener('mouseup', stopResize);
}

function doResize(e) {
  if (!resizing) return;
  const diff = e.clientX - startX;
  let newWidth = Math.max(resizing.min, Math.min(resizing.max, startWidth + diff));
  updateColWidth(resizing.id, newWidth);
}

function stopResize() {
  document.querySelectorAll('.resize-handle').forEach(h => h.classList.remove('dragging'));
  resizing = null;
  document.removeEventListener('mousemove', doResize);
  document.removeEventListener('mouseup', stopResize);
}

function setView(v) {
  currentView = v;
  document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + v).classList.add('active');
  renderTableBody();
}

function updateStats() {
  document.getElementById('stats-rows').textContent = DATA.length + ' rows';
  const sum = getColumnSum();
  document.getElementById('stats-width').textContent = 'Width: ' + sum + 'px';
  
  // Update status indicator
  const status = document.getElementById('width-status');
  if (sum <= 1320) { // 1366 - 46px for margins
    status.className = 'width-ok';
    status.textContent = '✓ Fits 1366px';
  } else if (sum <= 1400) {
    status.className = 'width-warning';
    status.textContent = '⚠ Tight at 1366px';
  } else {
    status.className = 'width-warning';
    status.textContent = '✗ Too wide for 1366px';
  }
}

function resetAll() {
  COLUMNS.forEach(col => {
    columnWidths[col.id] = col.width;
    document.getElementById(`slider-${col.id}`).value = col.width;
    document.getElementById(`num-${col.id}`).value = col.width;
  });
  totalWidth = getColumnSum();
  document.getElementById('total-width').value = totalWidth;
  
  document.getElementById('fs-id').value = 12;
  document.getElementById('fs-header').value = 10;
  document.getElementById('fs-geo').value = 13;
  document.getElementById('fs-poloha').value = 12;
  document.getElementById('fs-chips').value = 11;
  document.getElementById('row-padding').value = 10;
  document.getElementById('border-width').value = 1;
  document.getElementById('border-color').value = '#E5E5E5';
  document.getElementById('dot-size').value = 8;
  document.getElementById('dot-top').value = 3;
  
  updatePercentages();
  renderTable();
  updateStats();
}

// Initialize
createColumnControls();
updatePercentages();
renderTable();
updateStats();
</script>
